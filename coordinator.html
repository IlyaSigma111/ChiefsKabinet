<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Медиакоординатор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
        }

        .dark-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .sphere-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .sphere-2 { width: 500px; height: 500px; bottom: -200px; left: -100px; background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
        .sphere-3 { width: 400px; height: 400px; top: 50%; left: 30%; background: linear-gradient(135deg, #4facfe, #00f2fe); }

        .glass-card {
            background: rgba(20, 25, 35, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            padding: 24px 32px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 28px;
        }

        .panel {
            padding: 32px;
        }

        .panel h2 {
            font-size: 22px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        select, input, textarea {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
            font-family: inherit;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 16px;
            background: rgba(108, 140, 255, 0.25);
            border: 1px solid rgba(108, 140, 255, 0.4);
            border-radius: 32px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(108, 140, 255, 0.35);
            transform: translateY(-2px);
        }

        .mass-btn {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.3), rgba(236, 72, 153, 0.3));
            border-color: rgba(168, 85, 247, 0.5);
            margin-top: 8px;
        }

        .mass-btn:hover {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.45), rgba(236, 72, 153, 0.45));
        }

        .template-item {
            background: rgba(0, 0, 0, 0.35);
            padding: 18px 20px;
            border-radius: 24px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .template-item:hover {
            background: rgba(108, 140, 255, 0.15);
            transform: translateX(8px);
        }

        .template-item strong {
            font-size: 17px;
        }

        .task-item {
            background: rgba(0, 0, 0, 0.35);
            padding: 18px 20px;
            border-radius: 24px;
            margin-bottom: 12px;
        }

        .task-status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #10b981; }

        .info-note {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid #3b82f6;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            .header {
                padding: 18px 20px;
            }
            .header h1 {
                font-size: 22px;
            }
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .panel {
                padding: 24px;
            }
            .panel h2 {
                font-size: 20px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="dark-glow">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="container">
        <div class="header glass-card">
            <h1>🎛️ Медиакоординатор</h1>
            <div style="font-size: 15px; opacity: 0.6;">Управление задачами</div>
        </div>

        <div class="grid">
            <div class="panel glass-card">
                <h2>📋 Шаблоны задач</h2>
                <div id="templatesList"></div>
                <input type="text" id="newTemplateTitle" placeholder="Название шаблона">
                <textarea id="newTemplateDesc" placeholder="Описание шаблона"></textarea>
                <button onclick="createTemplate()">+ Создать шаблон</button>
            </div>

            <div class="panel glass-card">
                <h2>✏️ Создать задачу</h2>
                
                <div class="info-note">
                    📌 <strong>Кому отправить:</strong><br>
                    • <strong>Местному отделению</strong> — только главный шеф округа<br>
                    • <strong>Первичкам</strong> — все первичные отделения округа<br>
                    • <strong>ВСЕМ (распуш)</strong> — всем шефам всех округов (и местным, и первичкам)
                </div>

                <select id="templateSelect">
                    <option value="">Выберите шаблон</option>
                </select>
                
                <select id="targetSelect">
                    <option value="">Выберите кому отправить</option>
                    <option value="district">🏛️ Только местному отделению</option>
                    <option value="primary">📌 Всем первичкам этого округа</option>
                </select>
                
                <select id="districtSelect">
                    <option value="">Выберите местное отделение</option>
                </select>
                
                <button class="mass-btn" onclick="sendToAllDistricts()">🌍 РАСПУШ ДЛЯ ВСЕХ ОКРУГОВ</button>
                
                <input type="text" id="taskLink" placeholder="Ссылка (опционально)">
                <textarea id="taskComment" placeholder="Комментарий"></textarea>
                <button onclick="createAssignment()">📤 Отправить задачу</button>
            </div>

            <div class="panel glass-card">
                <h2>📊 Активные задачи</h2>
                <div id="activeTasksList" style="max-height: 600px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadTemplates() {
            const { data, error } = await sb.from('task_templates').select('*').eq('is_active', true);
            if (error) return;
            const container = document.getElementById('templatesList');
            const select = document.getElementById('templateSelect');
            
            if (data?.length) {
                container.innerHTML = data.map(t => `
                    <div class="template-item" onclick="selectTemplate(${t.id})">
                        <strong>${t.title}</strong>
                        <div style="font-size: 13px; opacity: 0.6; margin-top: 6px;">${t.description || ''}</div>
                    </div>
                `).join('');
                select.innerHTML = '<option value="">Выберите шаблон</option>' + 
                    data.map(t => `<option value="${t.id}">${t.title}</option>`).join('');
            } else {
                container.innerHTML = '<p style="opacity: 0.5; text-align: center; padding: 40px;">Нет шаблонов</p>';
            }
        }

        async function loadDistricts() {
            const { data, error } = await sb.from('districts').select('*').order('name');
            if (error) return;
            const select = document.getElementById('districtSelect');
            select.innerHTML = '<option value="">Выберите местное отделение</option>' + 
                (data || []).map(d => `<option value="${d.id}">${d.name}</option>`).join('');
        }

        async function loadActiveTasks() {
            const { data, error } = await sb
                .from('assignments')
                .select('*, task_templates(*), chiefs(name, primary_branch_id)')
                .neq('status', 'completed')
                .order('created_at', { ascending: false });
            
            if (error) return;
            
            const container = document.getElementById('activeTasksList');
            if (!data?.length) {
                container.innerHTML = '<p style="opacity: 0.5; text-align: center; padding: 60px;">✅ Нет активных задач</p>';
                return;
            }
            
            container.innerHTML = data.map(task => `
                <div class="task-item">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <strong style="font-size: 16px;">${task.task_templates?.title || 'Задача'}</strong>
                        <span class="task-status status-${task.status}">${task.status === 'pending' ? '⏳ Ожидает' : '🔄 В работе'}</span>
                    </div>
                    <div style="font-size: 13px; opacity: 0.7; margin-top: 8px;">Шеф: ${task.chiefs?.name || 'Шеф'} | ${task.chiefs?.primary_branch_id ? '📌 Первичка' : '🏛️ Местное'}</div>
                    ${task.link ? `<a href="${task.link}" target="_blank" style="color: #6c8cff; font-size: 13px; margin-top: 8px; display: inline-block;">🔗 Ссылка</a>` : ''}
                </div>
            `).join('');
        }

        async function createTemplate() {
            const title = document.getElementById('newTemplateTitle').value;
            const desc = document.getElementById('newTemplateDesc').value;
            if (!title) { alert('Введите название'); return; }
            
            const { error } = await sb.from('task_templates').insert([{ title, description: desc }]);
            if (error) {
                alert('Ошибка: ' + error.message);
                return;
            }
            document.getElementById('newTemplateTitle').value = '';
            document.getElementById('newTemplateDesc').value = '';
            loadTemplates();
            alert('Шаблон создан');
        }

        async function createAssignment() {
            const templateId = document.getElementById('templateSelect').value;
            const targetType = document.getElementById('targetSelect').value;
            const districtId = document.getElementById('districtSelect').value;
            const link = document.getElementById('taskLink').value;
            const comment = document.getElementById('taskComment').value;
            
            if (!templateId) { alert('Выберите шаблон'); return; }
            if (!districtId) { alert('Выберите местное отделение'); return; }
            if (!targetType) { alert('Выберите кому отправить (местное или первички)'); return; }
            
            let chiefs = [];
            
            if (targetType === 'district') {
                // Только главный шеф местного отделения (без первички)
                const { data } = await sb
                    .from('chiefs')
                    .select('id, district_id')
                    .eq('district_id', parseInt(districtId))
                    .is('primary_branch_id', null);
                chiefs = data || [];
            } else if (targetType === 'primary') {
                // Только первички этого округа
                const { data } = await sb
                    .from('chiefs')
                    .select('id, district_id')
                    .eq('district_id', parseInt(districtId))
                    .not('primary_branch_id', 'is', null);
                chiefs = data || [];
            }
            
            if (chiefs.length === 0) {
                alert('Нет шефов для назначения');
                return;
            }
            
            for (const chief of chiefs) {
                await sb.from('assignments').insert([{
                    template_id: parseInt(templateId),
                    chief_id: chief.id,
                    district_id: chief.district_id,
                    link: link,
                    coordinator_comment: comment,
                    status: 'pending'
                }]);
            }
            
            alert(`✅ Задача отправлена ${chiefs.length} шефам!`);
            document.getElementById('taskLink').value = '';
            document.getElementById('taskComment').value = '';
            loadActiveTasks();
        }

        async function sendToAllDistricts() {
            const templateId = document.getElementById('templateSelect').value;
            const link = document.getElementById('taskLink').value;
            const comment = document.getElementById('taskComment').value;
            
            if (!templateId) { alert('Выберите шаблон'); return; }
            
            // Получаем ВСЕХ шефов (и местные, и первички) из всех округов
            const { data: allChiefs, error } = await sb
                .from('chiefs')
                .select('id, district_id');
            
            if (error) {
                alert('Ошибка: ' + error.message);
                return;
            }
            
            if (!allChiefs?.length) {
                alert('Нет шефов для отправки');
                return;
            }
            
            let successCount = 0;
            for (const chief of allChiefs) {
                const { error: insertError } = await sb.from('assignments').insert([{
                    template_id: parseInt(templateId),
                    chief_id: chief.id,
                    district_id: chief.district_id,
                    link: link,
                    coordinator_comment: comment,
                    status: 'pending'
                }]);
                if (!insertError) successCount++;
            }
            
            alert(`🌍 РАСПУШ выполнен! Задача отправлена ${successCount} шефам во всех округах!`);
            document.getElementById('taskLink').value = '';
            document.getElementById('taskComment').value = '';
            loadActiveTasks();
        }

        function selectTemplate(id) {
            document.getElementById('templateSelect').value = id;
        }

        loadTemplates();
        loadDistricts();
        loadActiveTasks();
    </script>
</body>
</html>
