<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кабинет шеф-редактора</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #0a0c10; color: rgba(255,255,255,0.95); min-height: 100vh; }
        .dark-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .glow-sphere { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; }
        .sphere-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .sphere-2 { width: 500px; height: 500px; bottom: -200px; left: -100px; background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
        .sphere-3 { width: 400px; height: 400px; top: 50%; left: 30%; background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .glass-card { background: rgba(20,25,35,0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .header { padding: 24px 32px; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo h2 { font-size: 28px; font-weight: 700; }
        .district-badge { background: rgba(108,140,255,0.2); padding: 12px 24px; border-radius: 60px; font-size: 16px; border: 1px solid rgba(108,140,255,0.3); }
        .reset-btn { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); padding: 12px 28px; border-radius: 60px; color: #f87171; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
        .stat-card { background: rgba(0,0,0,0.4); padding: 28px; border-radius: 28px; text-align: center; }
        .stat-number { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #fff, #b0c4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .menu-scroll { overflow-x: auto; margin-bottom: 28px; }
        .menu-items { display: inline-flex; gap: 12px; }
        .menu-btn { padding: 14px 28px; background: rgba(0,0,0,0.4); border: none; border-radius: 60px; color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer; }
        .menu-btn.active { background: rgba(108,140,255,0.25); border: 1px solid rgba(108,140,255,0.4); color: white; }
        .content { background: rgba(20,25,35,0.35); backdrop-filter: blur(20px); border-radius: 32px; padding: 32px; min-height: 500px; }
        .page { display: none; }
        .page.active { display: block; }
        .page h3 { font-size: 24px; margin-bottom: 28px; }
        .task-item { background: rgba(0,0,0,0.35); padding: 24px; border-radius: 24px; margin-bottom: 16px; }
        .task-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .deadline { font-size: 13px; margin: 8px 0; padding: 6px 12px; border-radius: 20px; display: inline-block; }
        .deadline-urgent { background: rgba(239,68,68,0.2); color: #f87171; }
        .deadline-normal { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .task-status { display: inline-block; padding: 6px 16px; border-radius: 40px; font-size: 13px; margin-top: 12px; }
        .status-pending { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .status-completed { background: rgba(16,185,129,0.2); color: #10b981; }
        .btn-complete { background: rgba(16,185,129,0.2); border: none; padding: 12px 24px; border-radius: 40px; color: #10b981; font-weight: 600; cursor: pointer; margin-top: 16px; width: 100%; }
        .link-input { width: 100%; padding: 14px 18px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: white; margin-top: 16px; }
        .history-item { background: rgba(0,0,0,0.3); padding: 16px 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table th, .ranking-table td { padding: 16px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.95); padding: 16px 32px; border-radius: 60px; z-index: 1000; border-left: 4px solid #6c8cff; white-space: nowrap; }
        @media (max-width: 768px) { .container { padding: 16px; } .stat-number { font-size: 32px; } .content { padding: 20px; } .toast { white-space: normal; max-width: 90%; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="dark-glow"><div class="glow-sphere sphere-1"></div><div class="glow-sphere sphere-2"></div><div class="glow-sphere sphere-3"></div></div>
    <div class="container">
        <div class="header glass-card">
            <div class="logo"><h2>📰 Кабинет шеф-редактора</h2></div>
            <div style="display: flex; gap: 16px;"><span class="district-badge" id="districtDisplay">📍 Загрузка...</span><button class="reset-btn" onclick="resetAndExit()">Сменить</button></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div>Всего задач</div></div>
            <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div>Выполнено</div></div>
            <div class="stat-card"><div class="stat-number" id="totalScore">0</div><div>Баллов</div></div>
        </div>
        <div class="menu-scroll"><div class="menu-items">
            <button class="menu-btn active" data-page="tasks">📋 Мои задачи</button>
            <button class="menu-btn" data-page="rating">🏆 Рейтинг</button>
            <button class="menu-btn" data-page="history">📜 История</button>
            <button class="menu-btn" data-page="help">❓ Справка</button>
        </div></div>
        <div class="content">
            <div id="tasks" class="page active"><h3>📋 Мои задачи</h3><div id="tasksList"></div></div>
            <div id="rating" class="page"><h3>🏆 Рейтинг шеф-редакторов</h3><div style="overflow-x: auto;"><table class="ranking-table"><thead><tr><th>Шеф</th><th>Отделение</th><th>Баллы</th></tr></thead><tbody id="ratingList"></tbody></table></div></div>
            <div id="history" class="page"><h3>📜 История операций</h3><div id="historyList"></div></div>
            <div id="help" class="page"><h3>❓ Справка</h3><p style="opacity:0.7; line-height:1.6;">• Выполняйте задачи и прикрепляйте ссылки (t.me или vk.com)<br>• 1 ссылка = 1 балл<br>• У задач есть срок выполнения — старайтесь успеть!</p></div>
        </div>
    </div>
    <script>
        const SB_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SB_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        const sb = supabase.createClient(SB_URL, SB_KEY);
        
        let chiefId = localStorage.getItem('chiefId');
        let districtName = localStorage.getItem('chiefDistrictName');
        let branchId = localStorage.getItem('chiefBranchId');
        
        if (!chiefId) window.location.href = 'index.html';
        document.getElementById('districtDisplay').innerHTML = `📍 ${districtName}${branchId ? ' • Первичка' : ''}`;
        
        async function loadTasks() {
            const { data } = await sb.from('assignments').select('*, task_templates(*)').eq('chief_id', chiefId).order('created_at', { ascending: false });
            const container = document.getElementById('tasksList');
            if (!data?.length) { container.innerHTML = '<p style="opacity:0.5; text-align:center; padding:60px;">📭 Нет задач</p>'; return; }
            
            container.innerHTML = data.map(task => {
                let deadlineHtml = '';
                if (task.deadline) {
                    const deadlineDate = new Date(task.deadline);
                    const isExpired = deadlineDate < new Date();
                    deadlineHtml = `<div class="deadline ${isExpired ? 'deadline-urgent' : 'deadline-normal'}">⏰ Срок: ${deadlineDate.toLocaleString()} ${isExpired ? '(просрочено!)' : ''}</div>`;
                }
                return `<div class="task-item">
                    <div class="task-title">${task.task_templates?.title || 'Задача'}</div>
                    <div style="font-size:14px; opacity:0.7;">${task.task_templates?.description || ''}</div>
                    ${deadlineHtml}
                    ${task.link ? `<a href="${task.link}" target="_blank" style="color:#6c8cff;">🔗 ${task.link}</a>` : ''}
                    <div><span class="task-status status-${task.status}">${task.status === 'pending' ? '⏳ Ожидает' : '✅ Выполнено'}</span></div>
                    ${task.status === 'pending' ? `<input type="text" id="link_${task.id}" class="link-input" placeholder="Вставьте ссылку (t.me или vk.com)"><button class="btn-complete" onclick="completeTask(${task.id})">✅ Выполнить +1 балл</button>` : ''}
                </div>`;
            }).join('');
        }
        
        async function completeTask(taskId) {
            const linkInput = document.getElementById(`link_${taskId}`);
            const link = linkInput?.value?.trim();
            if (!link) { alert('Вставьте ссылку на выполненную работу'); return; }
            if (!link.includes('t.me') && !link.includes('vk.com')) { alert('Ссылка должна быть на t.me или vk.com'); return; }
            
            await sb.from('assignments').update({ status: 'completed', link: link, completed_at: new Date() }).eq('id', taskId);
            await sb.from('operations_history').insert([{ chief_id: chiefId, assignment_id: taskId, action: 'Выполнена задача, +1 балл' }]);
            
            const { data: completed } = await sb.from('assignments').select('id').eq('chief_id', chiefId).eq('status', 'completed');
            await sb.from('chief_scores').upsert({ chief_id: chiefId, total_score: completed?.length || 0 });
            
            loadTasks(); loadStats(); loadHistory();
            showToast('✅ Задача выполнена! +1 балл');
        }
        
        async function loadStats() {
            const { data: tasks } = await sb.from('assignments').select('status').eq('chief_id', chiefId);
            const { data: score } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
            document.getElementById('totalTasks').innerText = tasks?.length || 0;
            document.getElementById('completedTasks').innerText = tasks?.filter(t => t.status === 'completed').length || 0;
            document.getElementById('totalScore').innerText = score?.total_score || 0;
        }
        
        async function loadHistory() {
            const { data } = await sb.from('operations_history').select('*').eq('chief_id', chiefId).order('created_at', { ascending: false }).limit(30);
            const container = document.getElementById('historyList');
            if (!data?.length) { container.innerHTML = '<p style="opacity:0.5; text-align:center; padding:60px;">📭 История пуста</p>'; return; }
            container.innerHTML = data.map(h => `<div class="history-item"><span>${h.action}</span><span style="opacity:0.5;">${new Date(h.created_at).toLocaleString()}</span></div>`).join('');
        }
        
        async function loadRating() {
            const { data } = await sb.from('chief_scores').select('*, chiefs(name, primary_branch_id)').order('total_score', { ascending: false });
            const container = document.getElementById('ratingList');
            if (!data?.length) { container.innerHTML = '<tr><td colspan="3" style="text-align:center;">Нет данных</td></tr>'; return; }
            container.innerHTML = data.map(s => `<tr><td>${s.chiefs?.name?.split('Шеф')[0] || 'Шеф'}</td><td>${s.chiefs?.primary_branch_id ? '📌 Первичка' : '🏛️ Местное'}</td><td style="color:#6c8cff;">${s.total_score} баллов</td></tr>`).join('');
        }
        
        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
        function resetAndExit() { localStorage.clear(); window.location.href = 'index.html'; }
        
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(btn.dataset.page).classList.add('active');
                if (btn.dataset.page === 'rating') loadRating();
                if (btn.dataset.page === 'history') loadHistory();
            });
        });
        
        if (Notification.permission !== 'granted' && Notification.permission !== 'denied') Notification.requestPermission();
        loadTasks(); loadStats(); loadHistory(); loadRating();
        setInterval(() => { loadTasks(); }, 30000);
    </script>
</body>
</html>
