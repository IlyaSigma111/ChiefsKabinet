<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Кабинет шеф-редактора</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0c10;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }
        .card {
            background: #1a1e2a;
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo h2 {
            font-size: 20px;
            font-weight: 600;
        }
        .district-badge {
            background: #2d3748;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
        }
        .reset-btn {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #f87171;
            font-size: 14px;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: #1a1e2a;
            padding: 16px 8px;
            border-radius: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #6c8cff;
        }
        .stat-label {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .menu-items {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        .menu-btn {
            padding: 10px 20px;
            background: #2d3748;
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }
        .menu-btn.active {
            background: #6c8cff;
        }
        .content {
            background: #1a1e2a;
            border-radius: 24px;
            padding: 20px;
            min-height: 400px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .page h3 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        .task-item {
            background: #0f1117;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid #2d3748;
        }
        .task-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .task-desc {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        .deadline {
            font-size: 11px;
            margin: 6px 0;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        .deadline-normal {
            background: #f59e0b20;
            color: #f59e0b;
        }
        .deadline-urgent {
            background: #f8717120;
            color: #f87171;
        }
        .task-link {
            color: #6c8cff;
            text-decoration: none;
            font-size: 12px;
            word-break: break-all;
        }
        .task-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 8px;
        }
        .status-pending {
            background: #f59e0b20;
            color: #f59e0b;
        }
        .status-completed {
            background: #10b98120;
            color: #10b981;
        }
        .status-expired {
            background: #f8717120;
            color: #f87171;
        }
        .btn-complete {
            background: #10b98120;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: #10b981;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
        }
        .btn-disabled {
            background: #4a4a4a20;
            color: #888;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .link-input {
            width: 100%;
            padding: 12px;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            margin-top: 12px;
        }
        .history-item {
            background: #0f1117;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }
        .ranking-table th, .ranking-table td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid #2d3748;
            font-size: 13px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 1000;
            border-left: 4px solid #6c8cff;
            font-size: 13px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }
        .expired-warning {
            background: #f8717120;
            padding: 8px 12px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 11px;
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo"><h2>📰 Кабинет шеф-редактора</h2></div>
                <div style="display: flex; gap: 10px;">
                    <span class="district-badge" id="districtDisplay">Загрузка...</span>
                    <button class="reset-btn" onclick="resetAndExit()">Сменить</button>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div class="stat-label">Всего задач</div></div>
            <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div class="stat-label">Выполнено</div></div>
            <div class="stat-card"><div class="stat-number" id="totalScore">0</div><div class="stat-label">Баллов</div></div>
        </div>

        <div class="menu-items">
            <button class="menu-btn active" data-page="tasks">Мои задачи</button>
            <button class="menu-btn" data-page="rating">Рейтинг</button>
            <button class="menu-btn" data-page="history">История</button>
            <button class="menu-btn" data-page="help">Справка</button>
        </div>

        <div class="content">
            <div id="tasks" class="page active"><h3>Мои задачи</h3><div id="tasksList"></div></div>
            <div id="rating" class="page"><h3>Рейтинг округов</h3><div style="overflow-x:auto;"><table class="ranking-table"><thead> <tr><th>Округ</th><th>Баллы</th></tr> </thead><tbody id="ratingList"></tbody></table></div></div>
            <div id="history" class="page"><h3>История</h3><div id="historyList"></div></div>
            <div id="help" class="page"><h3>Справка</h3><p style="opacity:0.7;">• Выполняйте задачи и прикрепляйте ссылки (t.me или vk.com)<br>• 1 ссылка = 1 балл<br>• Просроченные задачи нельзя выполнить</p></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let chiefId = localStorage.getItem('chiefId');
        let districtName = localStorage.getItem('chiefDistrictName');
        let branchType = localStorage.getItem('chiefBranchType');
        
        // Проверка просрочки
        function isTaskExpired(deadline) {
            if (!deadline) return false;
            const deadlineDate = new Date(deadline);
            const now = new Date();
            return deadlineDate < now;
        }
        
        if (!chiefId) {
            document.getElementById('tasksList').innerHTML = '<div class="empty-state">⚠️ Не выбран округ. <a href="index.html" style="color:#6c8cff;">На главную</a></div>';
            document.getElementById('districtDisplay').innerHTML = 'Ошибка';
        } else {
            document.getElementById('districtDisplay').innerHTML = '📍 ' + (districtName || 'Неизвестно') + (branchType === 'primary' ? ' • Первичка' : '');
        }
        
        async function loadTasks() {
            if (!chiefId) return;
            const container = document.getElementById('tasksList');
            container.innerHTML = '<div class="empty-state">⏳ Загрузка...</div>';
            
            try {
                const { data, error } = await supabaseClient
                    .from('assignments')
                    .select('*, task_templates(*)')
                    .eq('chief_id', chiefId)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 Нет задач</div>';
                    return;
                }
                
                let html = '';
                for (let i = 0; i < data.length; i++) {
                    const task = data[i];
                    const expired = isTaskExpired(task.deadline);
                    let deadlineHtml = '';
                    let expiredWarning = '';
                    
                    if (task.deadline) {
                        const deadlineDate = new Date(task.deadline);
                        const isExpired = expired;
                        deadlineHtml = '<div class="deadline ' + (isExpired ? 'deadline-urgent' : 'deadline-normal') + '">⏰ Срок: ' + deadlineDate.toLocaleString() + (isExpired ? ' (просрочено!)' : '') + '</div>';
                        if (isExpired && task.status === 'pending') {
                            expiredWarning = '<div class="expired-warning">⚠️ Срок выполнения истёк! Задача просрочена.</div>';
                        }
                    }
                    
                    html += '<div class="task-item">' +
                        '<div class="task-title">' + (task.task_templates?.title || 'Задача') + '</div>' +
                        '<div class="task-desc">' + (task.task_templates?.description || '') + '</div>' +
                        deadlineHtml +
                        (task.link ? '<a href="' + task.link + '" target="_blank" class="task-link">🔗 Ссылка</a>' : '') +
                        (task.coordinator_comment ? '<div style="font-size:12px; margin-top:8px; color:#6c8cff;">💬 ' + task.coordinator_comment + '</div>' : '') +
                        '<div><span class="task-status ' + (expired && task.status === 'pending' ? 'status-expired' : (task.status === 'pending' ? 'status-pending' : 'status-completed')) + '">' + 
                            (task.status === 'pending' ? (expired ? '⏰ Просрочено' : '⏳ Ожидает') : '✅ Выполнено') + 
                        '</span></div>' +
                        expiredWarning;
                    
                    if (task.status === 'pending' && !expired) {
                        html += '<input type="text" id="link_' + task.id + '" class="link-input" placeholder="Вставьте ссылку (t.me или vk.com)">' +
                                '<button class="btn-complete" onclick="completeTask(' + task.id + ')">✅ Выполнить +1 балл</button>';
                    } else if (task.status === 'pending' && expired) {
                        html += '<button class="btn-complete btn-disabled" disabled style="opacity:0.5; cursor:not-allowed;">❌ Просрочено, выполнить нельзя</button>';
                    }
                    html += '</div>';
                }
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="empty-state">⚠️ Ошибка: ' + err.message + '</div>';
            }
        }
        
        window.completeTask = async function(taskId) {
            // Получаем задачу, чтобы проверить дедлайн
            const { data: task, error: fetchError } = await supabaseClient
                .from('assignments')
                .select('deadline')
                .eq('id', taskId)
                .single();
            
            if (fetchError) {
                alert('Ошибка проверки задачи');
                return;
            }
            
            // Проверяем просрочку
            if (isTaskExpired(task.deadline)) {
                alert('❌ Срок выполнения задачи истёк! Выполнить невозможно.');
                loadTasks(); // Обновляем список
                return;
            }
            
            const linkInput = document.getElementById('link_' + taskId);
            const link = linkInput ? linkInput.value.trim() : '';
            if (!link) { alert('Вставьте ссылку'); return; }
            if (!link.includes('t.me') && !link.includes('vk.com')) { alert('Ссылка должна быть на t.me или vk.com'); return; }
            
            try {
                await supabaseClient.from('assignments').update({ status: 'completed', link: link, completed_at: new Date() }).eq('id', taskId);
                await supabaseClient.from('operations_history').insert([{ chief_id: chiefId, assignment_id: taskId, action: 'Выполнена задача +1 балл' }]);
                
                const { data: current } = await supabaseClient.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
                const newScore = (current?.total_score || 0) + 1;
                await supabaseClient.from('chief_scores').upsert({ chief_id: chiefId, total_score: newScore, updated_at: new Date() });
                
                loadTasks(); loadStats(); loadHistory(); loadRating();
                showToast('✅ Задача выполнена! +1 балл');
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        };
        
        async function loadStats() {
            if (!chiefId) return;
            try {
                const { data: tasks } = await supabaseClient.from('assignments').select('status').eq('chief_id', chiefId);
                const { data: score } = await supabaseClient.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
                document.getElementById('totalTasks').innerText = tasks?.length || 0;
                document.getElementById('completedTasks').innerText = tasks ? tasks.filter(t => t.status === 'completed').length : 0;
                document.getElementById('totalScore').innerText = score?.total_score || 0;
            } catch (err) {}
        }
        
        async function loadHistory() {
            if (!chiefId) return;
            const container = document.getElementById('historyList');
            container.innerHTML = '<div class="empty-state">⏳ Загрузка...</div>';
            try {
                const { data } = await supabaseClient.from('operations_history').select('*').eq('chief_id', chiefId).order('created_at', { ascending: false }).limit(30);
                if (!data || data.length === 0) { container.innerHTML = '<div class="empty-state">📭 История пуста</div>'; return; }
                let html = '';
                for (let i = 0; i < data.length; i++) {
                    html += '<div class="history-item"><span>' + data[i].action + '</span><span style="opacity:0.5;">' + new Date(data[i].created_at).toLocaleString() + '</span></div>';
                }
                container.innerHTML = html;
            } catch (err) { container.innerHTML = '<div class="empty-state">⚠️ Ошибка</div>'; }
        }
        
        async function loadRating() {
            if (!chiefId) return;
            const container = document.getElementById('ratingList');
            container.innerHTML = '发展<td colspan="2" class="empty-state">⏳ Загрузка...<\/td><\/tr>';
            try {
                const { data: chiefs } = await supabaseClient.from('chiefs').select('id, district_id, districts(name)');
                const { data: scores } = await supabaseClient.from('chief_scores').select('*');
                const scoreMap = {};
                if (scores) for (let s of scores) scoreMap[s.chief_id] = s.total_score || 0;
                const districts = {};
                if (chiefs) for (let c of chiefs) { const name = c.districts?.name || 'Неизвестно'; districts[name] = (districts[name] || 0) + (scoreMap[c.id] || 0); }
                const sorted = Object.entries(districts).sort((a,b) => b[1] - a[1]);
                if (sorted.length === 0) { container.innerHTML = '发展<td colspan="2" class="empty-state">Нет данных<\/td><\/tr>'; return; }
                let html = '';
                for (let i = 0; i < sorted.length; i++) { html += '发展<td style="font-weight:500;">' + sorted[i][0] + '<\/td><td style="color:#6c8cff;">' + sorted[i][1] + ' баллов<\/td><\/tr>'; }
                container.innerHTML = html;
            } catch (err) { container.innerHTML = '发展<td colspan="2" class="empty-state">⚠️ Ошибка<\/td><\/tr>'; }
        }
        
        function showToast(msg) {
            const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        window.resetAndExit = function() { localStorage.clear(); window.location.href = 'index.html'; };
        
        const btns = document.querySelectorAll('.menu-btn');
        for (let i = 0; i < btns.length; i++) {
            btns[i].onclick = function() {
                for (let j = 0; j < btns.length; j++) btns[j].classList.remove('active');
                this.classList.add('active');
                for (let j = 0; j < document.querySelectorAll('.page').length; j++) document.querySelectorAll('.page')[j].classList.remove('active');
                document.getElementById(this.dataset.page).classList.add('active');
                if (this.dataset.page === 'rating') loadRating();
                if (this.dataset.page === 'history') loadHistory();
            };
        }
        
        if (chiefId) {
            loadStats();
            loadTasks();
            loadHistory();
            loadRating();
            setInterval(loadTasks, 30000);
        }
    </script>
</body>
</html>
